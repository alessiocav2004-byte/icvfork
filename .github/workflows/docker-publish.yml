name: Crea e Pubblica Immagine

on:
  push:
    branches: [ "main" ] # Se il tuo ramo principale si chiama "master", scrivi "master"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Login al GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compila e Carica l'immagine
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/alessiocav2004-byte/icvfork:latest
