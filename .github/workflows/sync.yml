name: Sync fork

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote (safe)
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/qwertyuiop8899/IlCorsaroViola.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync main
        run: |
          git checkout main
          git merge upstream/main --ff-only || git merge upstream/main --no-edit

      - name: Push changes
        run: git push origin main
